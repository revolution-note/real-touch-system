<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>触ると進化する世界</title>
<style>
body { margin:0; background:black; overflow:hidden; }
#msg {
  position:fixed;
  bottom:10px;
  left:10px;
  color:white;
}
</style>
</head>
<body>

<div id="msg">触るだけで変わる</div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let energy = 1;
let particles = [];

document.addEventListener("mousemove", e=>{
  energy += 0.01;

  for(let i=0;i<3*energy;i++){
    particles.push({
      x:e.clientX,
      y:e.clientY,
      vx:(Math.random()-0.5)*3,
      vy:(Math.random()-0.5)*3,
      life:80
    });
  }
});

function loop(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,c.width,c.height);

  particles.forEach((p,i)=>{
    p.vy += 0.05;
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,2,2);

    if(p.life<=0) particles.splice(i,1);
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
