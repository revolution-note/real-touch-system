<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:black;overflow:hidden;}
video,canvas{
  position:absolute; top:0; left:0; width:100%; height:100%;
}
#msg{
  position:absolute; top:16px; left:16px; color:#fff; font-size:16px; opacity:.8;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>
<div id="msg">Touch.</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const msg = document.getElementById("msg");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== カメラ（AR）=====
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=> video.srcObject = stream);

// ===== 音（低音）=====
let audioCtx;
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
}
function playSound(power){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type="sine";
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = 40 + power*60; // 低音
  gain.gain.value = 0.1;
  osc.start(); osc.stop(audioCtx.currentTime+0.06);
}

// ===== 振動 =====
function vibrate(power){
  if(navigator.vibrate){
    // パルスで“コツン感”
    navigator.vibrate([6, 12, 6]);
  }
}

// ===== 触れる画像（グリッド）=====
const img = new Image();
img.src = "your-image.jpg"; // ←同階層に置く

const gap = 14;           // 細かさ（小さいほど滑らか）
let points = [];

function buildGrid(){
  points = [];
  const w = img.width, h = img.height;
  const ox = canvas.width/2 - w/2;
  const oy = canvas.height/2 - h/2;

  for(let y=0;y<h;y+=gap){
    for(let x=0;x<w;x+=gap){
      const px = ox + x;
      const py = oy + y;
      points.push({x:px,y:py,ox:px,oy:py,vx:0,vy:0});
    }
  }
}

img.onload = buildGrid;

// ===== 入力 =====
let touch={x:0,y:0,px:0,py:0,active:false};

function setTouch(x,y){
  touch.px = touch.x; touch.py = touch.y;
  touch.x = x; touch.y = y;
  touch.active = true;
}

canvas.addEventListener("touchstart", e=>{ initAudio(); });
canvas.addEventListener("mousemove", ()=>{ initAudio(); });

canvas.addEventListener("mousemove", e=>{
  setTouch(e.clientX, e.clientY);
});

canvas.addEventListener("touchmove", e=>{
  const t=e.touches[0];
  setTouch(t.clientX, t.clientY);
});

canvas.addEventListener("touchend", ()=> touch.active=false);
canvas.addEventListener("mouseleave", ()=> touch.active=false);

// ===== 状態（意味）=====
let energy = 0;

// ===== ループ =====
function loop(){
  // AR背景
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  // 入力強度
  let speed = Math.hypot(touch.x-touch.px, touch.y-touch.py);
  let power = Math.min(1, speed/20);

  // 局所変形（“指の周りだけ”）
  points.forEach(p=>{
    if(touch.active){
      const dx = touch.x - p.x;
      const dy = touch.y - p.y;
      const dist = Math.hypot(dx,dy);

      if(dist < 120){
        const f = (120 - dist)/120;

        // 押し込み（遅延でリアル化）
        setTimeout(()=>{
          // 吸着＋引きずり
          p.vx += dx * 0.02 * f;
          p.vy += dy * 0.02 * f;

          // “止まる”感じ（引っかかり）
          p.vx *= 0.85;
          p.vy *= 0.85;

          // 位置も少し追従
          p.x += dx * 0.02 * f;
          p.y += dy * 0.02 * f;
        }, 20);

        // 音（少し遅らせる）
        setTimeout(()=> playSound(power), 40);

        // 振動（さらに遅らせる）
        setTimeout(()=> vibrate(power), 60);

        energy += 0.6;
      }
    }

    // バネで戻る
    p.vx += (p.ox - p.x)*0.02;
    p.vy += (p.oy - p.y)*0.02;

    // 摩擦（重さ）
    p.vx *= 0.92; p.vy *= 0.92;

    p.x += p.vx; p.y += p.vy;
  });

  // 画像を“面として”再描画
  if(img.complete){
    const w = img.width, h = img.height;
    const ox = canvas.width/2 - w/2;
    const oy = canvas.height/2 - h/2;

    // 小さなタイルで再描画（歪み表現）
    let i = 0;
    for(let y=0;y<h;y+=gap){
      for(let x=0;x<w;x+=gap){
        const p = points[i++];
        ctx.drawImage(
          img,
          x, y, gap, gap,   // 元画像の切り出し
          p.x, p.y, gap, gap // 変形後の位置
        );
      }
    }
  }

  // ===== 意味（メッセージ）=====
  energy = Math.max(0, energy*0.98);
  let text = "Stay.";
  if(energy > 40) text = "You are affecting it.";
  if(energy > 100) text = "You are changing everything.";
  msg.textContent = text;

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
