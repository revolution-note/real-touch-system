<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Real Touch System</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
#ui{position:fixed;bottom:10px;left:10px;}
button{margin:4px;padding:10px;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
<button onclick="connect()">接続</button>
<button onclick="mode=1">水</button>
<button onclick="mode=2">火</button>
<button onclick="mode=3">石</button>
<button onclick="toggleSlice()">断面</button>
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth,window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z = 2;

// 画像
const tex = await new THREE.TextureLoader().loadAsync("https://picsum.photos/512");

const geo = new THREE.PlaneGeometry(1.5,1.5,128,128);
const mat = new THREE.MeshStandardMaterial({map:tex});
const mesh = new THREE.Mesh(geo,mat);
scene.add(mesh);

// ライト
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(1,1,1);
scene.add(light);

// 入力
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let hit=false;
let uv=new THREE.Vector2();

canvas.addEventListener("pointermove",e=>{
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;

  ray.setFromCamera(mouse,camera);
  const res = ray.intersectObject(mesh);

  if(res.length>0){
    hit=true;
    uv = res[0].uv;
  }else{
    hit=false;
  }
});

// 変形
let touches=[];

function deform(){
  const pos = mesh.geometry.attributes.position;

  for(let i=0;i<pos.count;i++){
    let z=0;

    const u = (i%128)/128;
    const v = Math.floor(i/128)/128;

    touches.forEach(t=>{
      const d = Math.hypot(u-t.x,v-t.y);
      if(d<0.1){
        z -= (0.1-d)*t.f;
      }
    });

    pos.array[i*3+2] = z;
  }

  pos.needsUpdate=true;

  touches = touches.map(t=>({x:t.x,y:t.y,f:t.f*0.9})).filter(t=>t.f>0.01);
}

// 音
const ctx = new AudioContext();
function play(f){
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.frequency.value = 200+f*400;
  g.gain.value = 0.1;
  o.connect(g).connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.05);
}

// 振動
function vib(f){
  if(navigator.vibrate){
    navigator.vibrate(10+f*30);
  }
}

// デバイス
let port,writer;

async function connect(){
  port = await navigator.serial.requestPort();
  await port.open({baudRate:9600});
  writer = port.writable.getWriter();
}

async function send(t){
  if(!writer) return;
  await writer.write(new Uint8Array([t]));
}

// モード
let mode=1;

// 断面
let slice=false;
function toggleSlice(){
  slice=!slice;
  renderer.clippingPlanes = slice?[new THREE.Plane(new THREE.Vector3(0,0,1),0)]:[];
}

// ループ
function loop(){

  if(hit){
    touches.push({x:uv.x,y:uv.y,f:0.5});

    play(0.5);
    vib(0.5);
    send(mode);
  }

  deform();
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
