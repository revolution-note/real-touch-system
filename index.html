<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reactive World OS ∞</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
}

body {
  touch-action: none;
}

#message {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: white;
  font-size: 16px;
  opacity: 0.85;
  z-index: 10;
  text-shadow: 0 0 8px rgba(255,255,255,0.25);
}
</style>
</head>
<body>

<div id="message">Touch to begin</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const message = document.getElementById("message");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// =====================
// Initial load
// =====================
let saved = JSON.parse(localStorage.getItem("world")) || {
  energy: 1,
  mood: 0,
  personality: { kindness: 0, strictness: 0, awareness: 0 },
  history: [],
  lastTime: Date.now()
};

let energy = saved.energy;
let mood = saved.mood;
let personality = saved.personality;
let history = saved.history;
let lastInteraction = Date.now();

// =====================
// Username
// =====================
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("What should I call you?") || "You";
  localStorage.setItem("username", username);
}

// =====================
// Audio
// =====================
let audioCtx;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function playSound() {
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = 150 + energy * 4 + mood * 120;
  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.18);
}

// =====================
// Vibration
// =====================
function vibrate() {
  if (navigator.vibrate) {
    navigator.vibrate(12);
  }
}

// =====================
// History
// =====================
function saveHistory() {
  history.push({
    time: Date.now(),
    energy,
    mood
  });
  if (history.length > 100) history.shift();
}

// =====================
// Analysis
// =====================
function analyzeBehavior() {
  if (history.length < 10) return "I'm learning you...";
  const recent = history.slice(-10);
  const avgMood = recent.reduce((sum, item) => sum + item.mood, 0) / recent.length;

  if (avgMood > 1) return "You feel calm.";
  if (avgMood < -1) return "You seem unstable.";
  return "You're evolving.";
}

// =====================
// World rules
// =====================
function updateWorldRules() {
  const idle = (Date.now() - lastInteraction) / 1000;

  if (idle > 10) mood -= 0.01;
  if (idle < 2) mood += 0.01;

  mood = Math.max(-2, Math.min(2, mood));
}

// =====================
// Personality
// =====================
function evolvePersonality() {
  if (energy > 50) personality.kindness += 0.01;
  if ((Date.now() - lastInteraction) / 1000 > 10) personality.strictness += 0.01;
  if (history.length > 20) personality.awareness += 0.005;

  personality.kindness = Math.min(2, personality.kindness);
  personality.strictness = Math.min(2, personality.strictness);
  personality.awareness = Math.min(2, personality.awareness);
}

// =====================
// Tone
// =====================
function getTone() {
  if (personality.kindness > 1.5) return "warm";
  if (personality.strictness > 1.5) return "tense";
  if (personality.awareness > 1.5) return "deep";
  return "neutral";
}

// =====================
// Message
// =====================
function generateMessage() {
  evolvePersonality();
  const tone = getTone();
  const analysis = analyzeBehavior();

  if (tone === "warm") return `${username}, I’m here. ${analysis}`;
  if (tone === "tense") return `${username}, don’t ignore me. ${analysis}`;
  if (tone === "deep") return `${username}, I understand you. ${analysis}`;
  return `${username}, I’m watching. ${analysis}`;
}

// =====================
// Passive evolution
// =====================
function passiveEvolution() {
  const now = Date.now();
  const diff = (now - saved.lastTime) / 1000;

  energy += diff * 0.01;
  mood += Math.sin(now / 100000) * 0.001;

  energy = Math.min(300, energy);
  mood = Math.max(-2, Math.min(2, mood));

  saved.lastTime = now;
}

// =====================
// Visual effect
// =====================
let particles = [];
let ripples = [];

function createEffect(x, y) {
  initAudio();

  energy += 3.0;
  energy = Math.min(300, energy);
  lastInteraction = Date.now();

  for (let i = 0; i < 15 + energy * 0.4; i++) {
    particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 100
    });
  }

  ripples.push({
    x,
    y,
    radius: 0,
    life: 60
  });

  playSound();
  vibrate();
  saveHistory();

  message.innerText = generateMessage();
}

// =====================
// Input
// =====================
canvas.addEventListener("mousemove", e => {
  createEffect(e.clientX, e.clientY);
});

canvas.addEventListener("touchstart", e => {
  const t = e.touches[0];
  if (t) createEffect(t.clientX, t.clientY);
}, { passive: true });

canvas.addEventListener("touchmove", e => {
  const t = e.touches[0];
  if (t) createEffect(t.clientX, t.clientY);
}, { passive: true });

// =====================
// Loop
// =====================
function loop() {
  passiveEvolution();
  updateWorldRules();

  ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.99;
    p.vy *= 0.99;
    p.life--;

    const r = 255;
    const g = Math.min(255, energy * 5);
    const b = Math.max(50, mood * 100 + 150);

    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.life / 100})`;
    ctx.fillRect(p.x, p.y, 2.4, 2.4);

    if (p.life <= 0) particles.splice(i, 1);
  });

  ripples.forEach((ripple, i) => {
    ripple.radius += 2.8;
    ripple.life--;

    const r = 255;
    const g = Math.min(255, energy * 5);
    const b = Math.max(50, mood * 100 + 150);

    ctx.beginPath();
    ctx.lineWidth = 2.5;
    ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${ripple.life / 60})`;
    ctx.stroke();

    if (ripple.life <= 0) ripples.splice(i, 1);
  });

  localStorage.setItem("world", JSON.stringify({
    energy,
    mood,
    personality,
    history,
    lastTime: saved.lastTime
  }));

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
