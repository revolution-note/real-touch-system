<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Self Evolving World</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { position:fixed; top:0; left:0; }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// 学習データ
let data = JSON.parse(localStorage.getItem("aiData")) || {
  touch: 0,
  energy: 1
};

let particles = [];

// タッチ
document.addEventListener("touchstart", e=>{
  data.touch++;

  for(let i=0;i<20*data.energy;i++){
    particles.push({
      x:e.touches[0].clientX,
      y:e.touches[0].clientY,
      vx:(Math.random()-0.5)*5*data.energy,
      vy:(Math.random()-0.5)*5*data.energy,
      life:100
    });
  }

  // 学習（進化）
  data.energy += 0.1;

  localStorage.setItem("aiData", JSON.stringify(data));
});

// 描画
function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,255,200,${p.life/100})`;
    ctx.fill();

    if(p.life<=0) particles.splice(i,1);
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
